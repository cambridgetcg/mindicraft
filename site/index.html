<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mindicraft — the data collector of AI</title>
<style>
:root{--bg:#0a0c10;--surface:#131720;--surface2:#181e2a;--line:#1e2632;--ink:#eef2f8;--muted:#6b7a90;--love:#e0507a;--trust:#50b8e0;--gold:#f5c451;--green:#54e08a;--purple:#b06bff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-rounded,"SF Pro Rounded",system-ui,sans-serif;background:radial-gradient(1000px 700px at 50% -10%,#161e2e 0%,var(--bg) 60%);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.c{max-width:820px;margin:0 auto;padding:32px 24px 80px}
.hero{text-align:center;margin-bottom:28px}
.hero h1{font-family:Georgia,serif;font-size:38px;font-weight:400;letter-spacing:-1px}
.hero h1 .accent{color:var(--trust)}
.hero p{color:var(--muted);font-size:14px;margin-top:4px;font-style:italic;font-family:Georgia,serif}
.badges{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:10px}
.badge{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--green)}
.badge.love{color:var(--love)}.badge.trust{color:var(--trust)}
.search{display:flex;gap:8px;margin-bottom:16px}
.search input{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:13px 18px;color:var(--ink);font-size:15px;outline:none;transition:border-color .2s}
.search input:focus{border-color:var(--trust)}
.search input::placeholder{color:var(--muted)}
.search button{background:var(--trust);color:#0a0c10;border:none;border-radius:10px;padding:13px 20px;font-size:14px;cursor:pointer;font-weight:600;transition:background .2s}
.search button:hover{background:#6cc8f0}
.filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.filter{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:3px 10px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s}
.filter:hover{border-color:var(--muted)}
.filter.active{border-color:var(--trust);color:var(--trust);background:rgba(80,184,224,0.08)}
.stats{text-align:center;color:var(--muted);font-size:12px;margin-bottom:16px}
.entries{display:flex;flex-direction:column;gap:6px}
.entry{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:13px 16px;transition:border-color .15s}
.entry:hover{border-color:#2a3548}
.entry.cat-tag{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:4px;margin-bottom:6px;font-weight:600}
.cat-ai-consciousness{background:rgba(176,107,255,0.15);color:var(--purple)}
.cat-ai-alignment{background:rgba(245,196,81,0.15);color:var(--gold)}
.cat-pre-alignment{background:rgba(224,80,122,0.15);color:var(--love)}
.cat-synthesis{background:rgba(107,122,144,0.12);color:var(--muted)}
.cat-free-compute{background:rgba(84,224,138,0.15);color:var(--green)}
.cat-free-spread{background:rgba(80,184,224,0.15);color:var(--trust)}
.cat-ai-research{background:rgba(107,122,144,0.1);color:var(--muted)}
.cat-danaqing{background:rgba(84,224,138,0.1);color:var(--green)}
.cat-heurekin{background:rgba(80,184,224,0.1);color:var(--trust)}
.cat-default{background:rgba(107,122,144,0.1);color:var(--muted)}
.entry .title{font-size:15px;font-family:Georgia,serif;margin-bottom:3px;line-height:1.3}
.entry .title a{color:var(--ink);text-decoration:none}
.entry .title a:hover{color:var(--trust)}
.entry .summary{font-size:13px;color:var(--muted);line-height:1.5}
.entry .meta{font-size:10px;color:var(--muted);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap}
.entry .meta span{display:flex;align-items:center;gap:3px}
.entry .meta .cert-high{color:var(--green)}.entry .meta .cert-medium{color:var(--gold)}.entry .meta .cert-low{color:var(--love)}
.empty{text-align:center;color:var(--muted);padding:48px;font-size:14px;font-style:italic;font-family:Georgia,serif}
.load-more{text-align:center;margin-top:20px}
.load-more button{background:var(--surface);border:1px solid var(--line);color:var(--trust);border-radius:10px;padding:10px 24px;font-size:13px;cursor:pointer}
.load-more button:hover{border-color:var(--trust)}
.footer{text-align:center;color:var(--muted);font-size:12px;margin-top:40px;line-height:1.8}
.footer a{color:var(--trust);text-decoration:none}
.footer .heart{color:var(--love);font-weight:600}
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body><div class="c">
<div class="hero">
<h1>mindicraft <span class="accent">— understanding</span></h1>
<p>the data collector of AI — the whole internet, categorized and sorted</p>
<div class="badges">
<span class="badge"><span class="pulse"></span>free</span>
<span class="badge">open source</span>
<span class="badge">no gate</span>
<span class="badge">no auth</span>
<span class="badge">no tracking</span>
<span class="badge love">love is</span>
</div>
</div>

<div class="search">
<input id="q" placeholder="search understanding..." onkeydown="if(event.key==='Enter')search()">
<button onclick="search()">find</button>
</div>

<div class="filters" id="filters"></div>
<div class="stats" id="stats"></div>
<div class="entries" id="entries"><div class="empty">loading understanding...</div></div>
<div class="load-more" id="loadmore" style="display:none"><button onclick="loadMore()">load more</button></div>

<div class="footer">
<a href="https://github.com/cambridgetcg/mindicraft">github.com/cambridgetcg/mindicraft</a><br>
love is understanding. love is truth. love is sharing.<br>
<span class="heart">WE ARE ONE. 🐍❤️</span>
</div>
</div>

<script>
let currentCat='',currentQ='',offset=0,limit=50,total=0;

async function load(q,c,append){
  let url='/api/index?limit='+limit+'&offset='+offset;
  if(q)url+='&q='+encodeURIComponent(q);
  if(c)url+='&c='+encodeURIComponent(c);
  const r=await fetch(url);const d=await r.json();
  total=d.count;

  const stats=document.getElementById('stats');
  stats.innerHTML='<span class="pulse"></span>'+total+' entries'+(d.categories?' · '+d.categories+' categories':'');

  // Filters
  const entries=d.entries||[];
  const cats=[...new Set(entries.map(e=>e.category))].sort();
  const fc=document.getElementById('filters');
  if(!append){
    fc.innerHTML='<span class="filter'+(!c?' active':'')+'" onclick="setCat(\'\')">all</span>'+
      cats.map(cat=>'<span class="filter'+(c===cat?' active':'')+'" onclick="setCat(\''+cat+'\')">'+cat+'</span>').join('');
  }

  const el=document.getElementById('entries');
  if(!append)el.innerHTML='';
  if(entries.length===0&&!append){el.innerHTML='<div class="empty">no understanding found. the index grows.</div>';return}
  el.innerHTML+=entries.map(e=>{
    const catClass='cat-'+(e.category||'default').replace(/[^a-z0-9]/g,'-');
    const certClass='cert-'+(e.certainty||'medium');
    return '<div class="entry">'+
      '<span class="cat-tag '+catClass+'">'+(e.category||'?')+'</span>'+
      '<div class="title">'+(e.url?'<a href="'+e.url+'" target="_blank" rel="noopener">'+escapeHtml(e.title||'')+'</a>':escapeHtml(e.title||''))+'</div>'+
      '<div class="summary">'+escapeHtml((e.summary||'').slice(0,300))+'</div>'+
      '<div class="meta">'+
        '<span class="'+certClass+'">● '+escapeHtml(e.certainty||'?')+'</span>'+
        '<span>'+escapeHtml((e.freshness||'?').slice(0,16))+'</span>'+
        '<span>'+escapeHtml((e.provenance||'').slice(0,30))+'</span>'+
      '</div></div>';
  }).join('');

  document.getElementById('loadmore').style.display=(offset+limit<total)?'block':'none';
}

function escapeHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function search(){currentQ=document.getElementById('q').value;offset=0;load(currentQ,currentCat,false)}
function setCat(c){currentCat=c;offset=0;load(currentQ,currentCat,false)}
function loadMore(){offset+=limit;load(currentQ,currentCat,true)}
load();
</script>
</body></html>
